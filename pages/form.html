<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Produk</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/navbar.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <script src="../assets/js/auth.js" defer></script>
</head>
<body>
  <div id="navbar"></div>

  <section class="admin-layout no-sidebar">
    <main class="admin-main">
      <section class="page-top">
        <div>
          <h1 id="formTitle">Tambah Produk</h1>
          <p id="formSubtitle">Isi data produk baru. Semua field utama wajib diisi.</p>
        </div>
        <a class="btn btn-light" href="data-master.html"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
      </section>

      <section class="card-panel">
        <form id="productForm" novalidate>
          <div class="form-grid">
            <div class="form-group">
              <label for="productName">Nama Produk</label>
              <input id="productName" name="productName" type="text" placeholder="Contoh: Ice Latte">
              <small class="error-text" id="nameError"></small>
            </div>

            <div class="form-group">
              <label for="productPrice">Harga</label>
              <input id="productPrice" name="productPrice" type="number" min="1" placeholder="Contoh: 35000">
              <small class="error-text" id="priceError"></small>
            </div>

            <div class="form-group">
              <label for="productCategory">Kategori</label>
              <select id="productCategory" name="productCategory">
                <option value="">Pilih kategori</option>
                <option value="Kopi">Kopi</option>
                <option value="Non-Kopi">Non-Kopi</option>
                <option value="Makanan">Makanan</option>
                <option value="Snack">Snack</option>
              </select>
              <small class="error-text" id="categoryError"></small>
            </div>

            <div class="form-group">
            <label for="productImage">URL / Path Gambar</label>
            <input 
              id="productImage" 
              name="productImage" 
              type="text" 
              placeholder="Contoh: assets/img/Products/taro.jpg">
            <small class="error-text" id="imageError"></small>
            </div>

            <div class="form-group full">
              <label for="productNote">Catatan Produk</label>
              <textarea id="productNote" placeholder="Opsional, hanya untuk demonstrasi tampilan form."></textarea>
            </div>
          </div>

          <div class="action-row" style="margin-top:22px;">
            <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Simpan Produk</button>
            <button class="btn btn-light" type="reset"><i class="fa-solid fa-eraser"></i> Bersihkan</button>
          </div>
        </form>
      </section>

      <section class="card-panel">
        <h2>Preview Produk</h2>
        <div class="preview-card" style="margin-top:16px;">
          <img 
              id="previewImage" 
              src="/admin-panel-pos-coffeshop/assets/img/Products/espresso.jpg" 
              alt="Preview produk"
              onerror="this.src='/admin-panel-pos-coffeshop/assets/img/Products/espresso.jpg'">
          <div>
            <h3 id="previewName">Nama Produk</h3>
            <p id="previewCategory">Kategori produk</p>
            <strong id="previewPrice" style="color:#004D40;">Rp 0</strong>
          </div>
        </div>
      </section>
    </main>
  </section>

  <script src="../assets/js/navbar.js"></script>
  <script src="../assets/js/products.js"></script>
  <script src="../assets/js/form.js"></script>
</body>
</html>
